<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建功國小新進教師帳號申請</title>
    <style>
        /* 基礎字體放大 20% 並優化視覺 */
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box; 
            font-size: 1.2rem;
            color: #334155;
        }

        /* 表單主容器優化 */
        .form-container { 
            background-color: #ffffff; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); 
            width: 100%; 
            max-width: 540px; 
            border-top: 6px solid #2b6cb0; /* 頂部裝飾條 */
        }

        /* 標題美化與校徽對齊設定 */
        h2 { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px; /* 校徽與文字之間的間距 */
            color: #1a365d; 
            margin-top: 0; 
            margin-bottom: 32px; 
            font-size: 2rem; 
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 校徽大小控制 */
        .school-logo {
            height: 60px;
            width: auto;
        }

        .form-group { 
            margin-bottom: 28px; 
        }

        /* 欄位標籤 */
        label { 
            display: block; 
            margin-bottom: 10px; 
            color: #4a5568; 
            font-weight: 600; 
            font-size: 1.1rem; 
        }

        .required-label::after { 
            content: " *"; 
            color: #e53e3e; 
            font-weight: bold;
        }

        /* 輸入框美化與動畫 */
        input[type="text"], input[type="date"] { 
            width: 100%; 
            padding: 14px 16px; 
            border: 2px solid #cbd5e0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1.1rem; 
            color: #2d3748;
            background-color: #f7fafc;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="date"]:focus {
            border-color: #3182ce;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(49, 130, 206, 0.15);
            outline: none;
        }

        /* 自訂單選鈕樣式（卡片式選項，更方便點擊） */
        .radio-group { 
            display: flex; 
            gap: 16px; 
            padding: 4px 0; 
            font-size: 1.1rem; 
        }

        .radio-group > div {
            flex: 1;
            position: relative;
        }

        .radio-group input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .radio-group label {
            display: block;
            text-align: center;
            padding: 12px;
            background-color: #f7fafc;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 0;
            transition: all 0.2s ease;
        }

        .radio-group input[type="radio"]:checked + label {
            background-color: #ebf8ff;
            border-color: #3182ce;
            color: #2b6cb0;
            font-weight: 600;
        }

        .radio-group label:hover {
            background-color: #edf2f7;
        }

        /* 按鈕美化與動態反饋 */
        button[type="submit"] { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #3182ce 0%, #2b6cb0 100%);
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.25rem; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 6px -1px rgba(49, 130, 206, 0.2);
            transition: all 0.2s ease;
        }

        button[type="submit"]:hover { 
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
            transform: translateY(-1px);
            box-shadow: 0 7px 14px -3px rgba(49, 130, 206, 0.3);
        }

        button[type="submit"]:active {
            transform: translateY(1px);
        }

        button[type="submit"]:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* 彈跳視窗與毛玻璃背景 */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(4px); /* 毛玻璃效果 */
            justify-content: center; 
            align-items: center; 
        }

        .modal-content { 
            background-color: #fff; 
            padding: 40px; 
            border-radius: 16px; 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            animation: modalScaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); /* 彈出動畫 */
        }

        @keyframes modalScaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h3 { 
            font-size: 1.7rem; 
            color: #2f855a;
            margin-top: 0;
            margin-bottom: 12px;
        }

        .modal-content p { 
            font-size: 1.2rem; 
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 0;
        }

        .modal-btn { 
            margin-top: 28px; 
            padding: 12px 40px; 
            background-color: #2f855a; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.15rem; 
            font-weight: bold;
            transition: background 0.2s;
        }

        .modal-btn:hover {
            background-color: #276749;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>
        <img src="https://jkes.tc.edu.tw/var/file/196/1196/img/big-logo.gif" alt="建功國小校徽" class="school-logo">
        建功國小教師帳號申請
    </h2>
    <form id="dataForm">
        <div class="form-group">
            <label for="name" class="required-label">姓名</label>
            <input type="text" id="name" name="name" required placeholder="請輸入姓名">
        </div>
        <div class="form-group">
            <label class="required-label">性別</label>
            <div class="radio-group">
                <div>
                    <input type="radio" id="male" name="gender" value="男" required> 
                    <label for="male">男</label>
                </div>
                <div>
                    <input type="radio" id="female" name="gender" value="女"> 
                    <label for="female">女</label>
                </div>
                <div>
                    <input type="radio" id="other" name="gender" value="其他"> 
                    <label for="other">其他</label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label for="dob" class="required-label">出生年月日 (西元)</label>
            <input type="date" id="dob" name="dob" required>
        </div>
        <div class="form-group">
            <label for="idNumber" class="required-label">身分證字號</label>
            <input type="text" id="idNumber" name="idNumber" required placeholder="例如：A123456789">
        </div>
        <div class="form-group">
            <label for="account" class="required-label">自行設定帳號 (至少 6 個字元)</label>
            <input type="text" id="account" name="account" minlength="6" required placeholder="請設定 6 個字元以上">
        </div>
        <button type="submit" id="submitBtn">提交資料</button>
    </form>
</div>

<div id="successModal" class="modal">
    <div class="modal-content">
        <h3>🎉 成功提交！</h3>
        <p>資料已成功寫入，<br>歡迎加入建功國小團隊。</p>
        <button class="modal-btn" onclick="closeModal()">確定</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQJ7bSX-ROEWdqIZ1iHlv3C7G8nwqNTXXL3tM18c0NlWfAP7-PvkkXG-fH_HCvIv-vXw/exec";

    window.addEventListener('DOMContentLoaded', () => {
        const today = new Date();
        const year = today.getFullYear() - 22;
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        document.getElementById('dob').value = `${year}-${month}-${day}`;
    });

    function showModal() { document.getElementById('successModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('successModal').style.display = 'none'; }

    document.getElementById('dataForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = "資料傳送中...";

        fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams(new FormData(this)) })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                showModal();
                document.getElementById('dataForm').reset();
            } else {
                alert("提交失敗：" + data.message);
            }
        })
        .catch(err => alert("網路連線錯誤，請檢查網址或權限。"))
        .finally(() => { btn.disabled = false; btn.textContent = "提交資料"; });
    });
</script>

</body>
</html>
